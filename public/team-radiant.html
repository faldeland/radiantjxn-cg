<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>LIVE - Team Radiant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            radiant: {
              50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
              400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
              800: '#9a3412', 900: '#7c2d12',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300" x-data="teamRadiantApp()" x-init="init()" x-cloak>

  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-4 py-3 sticky top-0 z-40 shadow-sm transition-colors duration-300">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-2">
      <a href="https://www.radiantjxn.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 hover:opacity-90 transition-opacity min-w-0">
        <img src="https://avatars.planningcenteronline.com/uploads/organization/123537-1387786808/avatar.2.png" alt="Radiant Church Jackson" class="w-9 h-9 rounded-lg object-cover flex-shrink-0">
        <div class="min-w-0">
          <h1 class="text-[1.82rem] sm:text-4xl font-bold leading-none flex flex-col sm:flex-row sm:inline-flex sm:gap-2 gap-0.5">
            <span class="text-gray-900 dark:text-white">LIVE</span>
            <span class="text-radiant-600 tagline-fade block sm:inline" :class="taglineFading ? 'fading' : ''" x-text="currentTagline"></span>
          </h1>
        </div>
      </a>
      <div class="flex items-center gap-2 md:gap-3 flex-shrink-0">
      <nav class="hidden md:flex items-center gap-1 text-sm font-semibold">
        <a href="index.html" class="px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Community Groups</a>
        <a href="team-radiant.html" class="px-3 py-1.5 rounded-lg bg-radiant-100 dark:bg-radiant-900/40 text-radiant-800 dark:text-radiant-200 transition-colors">Team Radiant</a>
      </nav>
      <div class="flex items-center gap-1.5">
        <div class="hidden sm:flex items-center gap-1.5">
          <div class="flex items-center gap-0">
            <button @click="decreaseTileSize()"
                    class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors disabled:opacity-30 disabled:cursor-default"
                    :disabled="tileSize <= 1"
                    title="Smaller tiles">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 12h14"/></svg>
            </button>
            <button @click="increaseTileSize()"
                    class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors disabled:opacity-30 disabled:cursor-default"
                    :disabled="tileSize >= tileSizes.length"
                    title="Larger tiles">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
          <button @click="toggleDarkMode()"
                  class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"
                  :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
            <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
          <button @click="showSearch = !showSearch"
                  class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"
                  title="Search">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
          <button @click="refreshTeamRadiant()"
                  class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  :class="refreshing ? 'animate-spin text-radiant-600' : ''"
                  :disabled="refreshing || !canRefresh"
                  title="Refresh Team Radiant from radiantjxn.com">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </div>
        <button @click="menuOpen = !menuOpen"
                class="sm:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"
                title="Menu">
          <svg x-show="!menuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="menuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      </div>
    </div>
    <div x-show="menuOpen" x-transition class="sm:hidden max-w-7xl mx-auto mt-2 pb-1">
      <div class="flex flex-col gap-1 bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
        <a href="index.html" @click="menuOpen = false" class="px-3 py-2 rounded-lg text-gray-700 dark:text-gray-200 text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600">Community Groups</a>
        <a href="team-radiant.html" @click="menuOpen = false" class="px-3 py-2 rounded-lg bg-radiant-100 dark:bg-radiant-900/40 text-radiant-800 dark:text-radiant-200 text-sm font-semibold">Team Radiant</a>
        <div class="flex items-center justify-between px-2 py-1.5 border-t border-gray-200 dark:border-gray-600 mt-1">
          <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">Tile Size</span>
          <div class="flex items-center gap-0">
            <button @click="decreaseTileSize()"
                    class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-500 dark:text-gray-400 transition-colors disabled:opacity-30 disabled:cursor-default"
                    :disabled="tileSize <= 1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 12h14"/></svg>
            </button>
            <button @click="increaseTileSize()"
                    class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-500 dark:text-gray-400 transition-colors disabled:opacity-30 disabled:cursor-default"
                    :disabled="tileSize >= tileSizes.length">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <button @click="toggleDarkMode(); menuOpen = false"
                class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm transition-colors">
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span x-text="darkMode ? 'Light Mode' : 'Dark Mode'"></span>
        </button>
        <button @click="showSearch = !showSearch; menuOpen = false"
                class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <span>Search</span>
        </button>
        <button @click="refreshTeamRadiant(); menuOpen = false"
                class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm transition-colors disabled:opacity-50"
                :disabled="refreshing || !canRefresh">
          <svg class="w-5 h-5" :class="refreshing ? 'animate-spin text-radiant-600' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          <span>Refresh Team Radiant</span>
        </button>
      </div>
    </div>
    <div x-show="showSearch" x-transition class="max-w-7xl mx-auto mt-2">
      <input type="text" x-model="searchQuery" placeholder="Search serving opportunities..."
             class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-radiant-500 focus:border-transparent"
             @keydown.escape="showSearch = false; searchQuery = ''">
    </div>
  </header>

  <span x-show="lastUpdated"
        class="fixed top-1 right-2 z-50 text-[0.6rem] text-gray-400 dark:text-gray-500 pointer-events-none"
        x-text="'Updated ' + lastUpdated"></span>

  <div x-show="refreshMessage" x-transition
       class="max-w-7xl mx-auto px-2 lg:px-8 pt-2">
    <div class="rounded-lg px-4 py-2.5 text-sm flex items-center justify-between"
         :class="refreshError ? 'bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400' : 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400'">
      <span x-text="refreshMessage"></span>
      <button @click="refreshMessage = ''" class="ml-2 text-current opacity-60 hover:opacity-100">&times;</button>
    </div>
  </div>

  <div class="fixed inset-0 bg-white/85 dark:bg-black/75 backdrop-blur-[6px] z-0 transition-colors duration-300"></div>
  <main class="relative z-10 max-w-7xl mx-auto px-2 lg:px-8 pt-4 pb-16 min-h-screen transition-colors duration-300">

    <p x-show="loadError" class="text-center text-red-600 dark:text-red-400 py-8" x-text="loadError"></p>

    <div x-show="!loadError" class="space-y-6">
      <h2 class="text-center text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Serving opportunities</h2>

      <p x-show="searchQuery && !loadError && filteredOpportunities.length === 0" class="text-center text-sm text-gray-500 dark:text-gray-400 py-6">No opportunities match your search.</p>

      <div class="gap-3 card-grid-compact" x-show="filteredOpportunities.length > 0">
        <template x-for="opp in filteredOpportunities" :key="opp.id">
          <div class="w-full min-w-0 flex card-compact">
            <div class="compact-card bg-white dark:bg-gray-800 rounded-xl border border-radiant-200 dark:border-gray-700 overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer flex flex-col w-full"
                 @click="openDetail(opp)">
              <div class="tile-image-wrap aspect-[2/1] overflow-hidden bg-gray-100 dark:bg-gray-700 flex-shrink-0">
                <img :src="opportunityImage(opp)" :alt="opp.title"
                     class="tile-image w-full h-full object-cover object-center"
                     loading="lazy"
                     onerror="this.style.display='none'">
              </div>
              <div class="p-2 flex-grow flex flex-col">
                <h4 class="text-xs font-bold text-gray-900 dark:text-gray-100 leading-tight" x-text="opp.title"></h4>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div class="text-center max-w-3xl mx-auto space-y-3 pt-4 border-t border-gray-200 dark:border-gray-700">
        <p class="text-xs text-gray-400 dark:text-gray-500" x-show="sourceUrl">
          Content from <a :href="sourceUrl" target="_blank" rel="noopener noreferrer" class="text-radiant-600 dark:text-radiant-400 underline">radiantjxn.com/serve</a>
        </p>
        <template x-for="(para, i) in introParagraphs" :key="'intro-' + i">
          <p class="text-sm sm:text-base text-gray-600 dark:text-gray-300 leading-relaxed text-left" x-text="para"></p>
        </template>
        <div x-show="signUpUrl" class="pt-2">
          <a :href="signUpUrl" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-5 py-2.5 bg-radiant-600 text-white text-sm font-semibold rounded-xl hover:bg-radiant-700 transition-colors no-underline shadow-sm">
            Sign up to serve
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        </div>
      </div>

      <p x-show="closingNote" class="text-sm text-gray-500 dark:text-gray-400 text-center max-w-2xl mx-auto" x-text="closingNote"></p>
    </div>
  </main>

  <!-- Detail modal -->
  <div x-show="selected" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" @click.self="closeDetail()">
    <div x-show="selected" x-transition class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden max-h-[90vh] overflow-y-auto">
      <template x-if="selected">
        <div>
          <div class="aspect-[16/9] overflow-hidden bg-gray-100 dark:bg-gray-700 relative">
            <img :src="opportunityImage(selected)" :alt="selected.title"
                 class="w-full h-full object-cover object-center"
                 onerror="this.style.display='none'">
            <button type="button" @click="closeDetail()" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 text-white flex items-center justify-center hover:bg-black/60 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="p-5">
            <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2" x-text="selected.title"></h3>
            <span class="tag-pill inline-block mb-3" :class="tagClass()" x-text="selected.tag" x-show="selected.tag"></span>
            <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed mb-5" x-text="selected.description"></p>
            <div x-show="signUpUrl" class="space-y-3">
              <div class="flex items-end gap-4 pt-2 border-t border-gray-100 dark:border-gray-700 flex-row">
                <a :href="signUpUrl" target="_blank" rel="noopener noreferrer" class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-radiant-600 text-white font-semibold rounded-xl hover:bg-radiant-700 transition-colors no-underline">
                  Sign up to serve
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
                <div class="w-20 h-20 flex-shrink-0 bg-white dark:bg-gray-100 rounded p-0.5 qr-container"
                     :id="'qr-modal-' + selected.id"
                     x-effect="selected && signUpUrl && $nextTick(() => renderQRTo('qr-modal-' + selected.id, signUpUrl))"></div>
              </div>
              <p class="text-xs text-gray-400 dark:text-gray-500 text-center">Scan QR code to open the sign-up form on your phone</p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script src="js/team-radiant-app.js"></script>
</body>
</html>
