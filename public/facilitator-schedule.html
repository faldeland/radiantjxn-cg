<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>LIVE - Facilitator Schedule</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            radiant: {
              50: '#fff7ed',
              100: '#ffedd5',
              200: '#fed7aa',
              300: '#fdba74',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              900: '#7c2d12',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300" x-data="facilitatorScheduleApp()" x-init="init()" x-cloak>

  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-4 py-3 sticky top-0 z-40 shadow-sm transition-colors duration-300">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-2">
      <a href="https://www.radiantjxn.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 hover:opacity-90 transition-opacity min-w-0">
        <img src="https://avatars.planningcenteronline.com/uploads/organization/123537-1387786808/avatar.2.png" alt="Radiant Church Jackson" class="w-9 h-9 rounded-lg object-cover flex-shrink-0">
        <div class="min-w-0">
          <h1 class="text-[1.82rem] sm:text-4xl font-bold leading-none flex flex-col sm:flex-row sm:inline-flex sm:gap-2 gap-0.5">
            <span class="text-gray-900 dark:text-white">LIVE</span>
            <span class="text-radiant-600 tagline-fade block sm:inline" :class="taglineFading ? 'fading' : ''" x-text="currentTagline"></span>
          </h1>
        </div>
      </a>
      <div class="flex items-center gap-2 md:gap-3 flex-shrink-0">
      <nav class="hidden md:flex items-center gap-1 text-sm font-semibold">
        <a href="index.html" class="px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Community Groups</a>
        <a href="team-radiant.html" class="px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Team Radiant</a>
        <a href="events.html" class="px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Events</a>
      </nav>
      <div class="flex items-center gap-1.5">
        <div class="hidden sm:flex items-center gap-1.5">
          <button @click="toggleDarkMode()"
                  class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"
                  :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
            <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
        </div>
        <button @click="menuOpen = !menuOpen"
                class="sm:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"
                title="Menu">
          <svg x-show="!menuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="menuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      </div>
    </div>
    <div x-show="menuOpen" x-transition class="sm:hidden max-w-7xl mx-auto mt-2 pb-1">
      <div class="flex flex-col gap-1 bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
        <a href="index.html" @click="menuOpen = false" class="px-3 py-2 rounded-lg text-gray-700 dark:text-gray-200 text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600">Community Groups</a>
        <a href="team-radiant.html" @click="menuOpen = false" class="px-3 py-2 rounded-lg text-gray-700 dark:text-gray-200 text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600">Team Radiant</a>
        <a href="events.html" @click="menuOpen = false" class="px-3 py-2 rounded-lg text-gray-700 dark:text-gray-200 text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600">Events</a>
        <button @click="toggleDarkMode(); menuOpen = false"
                class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm transition-colors">
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span x-text="darkMode ? 'Light Mode' : 'Dark Mode'"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="fixed inset-0 bg-white/85 dark:bg-black/75 backdrop-blur-[6px] z-0 transition-colors duration-300"></div>

  <main class="relative z-10 max-w-3xl mx-auto px-4 lg:px-8 pt-6 pb-16 min-h-screen transition-colors duration-300">

    <!-- Calendar picker -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-4 mb-8">
      <div class="flex items-center justify-between mb-4">
        <button @click="prevMonth()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="text-lg font-bold text-gray-900 dark:text-white" x-text="calendarMonthLabel"></h2>
        <button @click="nextMonth()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Day-of-week headers -->
      <div class="grid grid-cols-7 text-center text-xs font-semibold text-gray-400 dark:text-gray-500 mb-1">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>

      <!-- Calendar grid -->
      <div class="grid grid-cols-7 gap-px">
        <template x-for="(cell, i) in calendarDays" :key="'cal-' + i">
          <div class="relative flex items-center justify-center h-10 text-sm rounded-lg transition-colors"
               :class="{
                 'cursor-pointer': cell.isSaturday,
                 'bg-radiant-50 dark:bg-radiant-900/20 font-bold text-radiant-700 dark:text-radiant-300': cell.isSaturday,
                 'ring-2 ring-radiant-500': cell.isToday,
                 'text-gray-700 dark:text-gray-300': !cell.isSaturday && !cell.blank,
                 'hover:bg-radiant-100 dark:hover:bg-radiant-900/40': cell.isSaturday,
               }"
               @click="cell.isSaturday && selectMonth()">
            <span x-text="cell.day"></span>
            <!-- Facilitator indicator dot -->
            <span x-show="cell.isSaturday && cell.hasFacilitator"
                  class="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-radiant-500"></span>
          </div>
        </template>
      </div>

      <div class="mt-3 text-center">
        <button @click="selectMonth()"
                class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors"
                :class="isSelectedMonth
                  ? 'bg-radiant-600 text-white shadow-sm'
                  : 'bg-radiant-100 dark:bg-radiant-900/40 text-radiant-700 dark:text-radiant-300 hover:bg-radiant-200 dark:hover:bg-radiant-900/60'">
          <span x-text="isSelectedMonth ? 'Viewing ' + calendarMonthLabel : 'View ' + calendarMonthLabel"></span>
        </button>
      </div>
    </div>

    <!-- Saturday schedule form -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700">
        <h3 class="text-base font-bold text-gray-900 dark:text-white" x-text="selectedMonthLabel + ' — Saturday Facilitators'"></h3>
      </div>

      <!-- Table header -->
      <div class="hidden sm:grid grid-cols-[7rem_1fr_1fr] gap-2 px-4 py-2 text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide border-b border-gray-100 dark:border-gray-700">
        <span>Day</span>
        <span>Date</span>
        <span>Facilitator Name</span>
      </div>

      <template x-for="sat in saturdays" :key="sat.date">
        <div class="grid grid-cols-1 sm:grid-cols-[7rem_1fr_1fr] gap-2 sm:gap-2 items-center px-4 py-3 border-b border-gray-50 dark:border-gray-700/50 last:border-b-0 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
          <span class="text-sm font-semibold text-gray-700 dark:text-gray-300" x-text="sat.dayLabel"></span>
          <span class="text-sm text-gray-500 dark:text-gray-400" x-text="sat.label"></span>
          <div class="flex items-center gap-2">
            <input type="text"
                   :value="sat.facilitator"
                   @change="saveFacilitator(sat.date, $event.target.value)"
                   @keydown.enter="$event.target.blur()"
                   placeholder="Enter facilitator name"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-radiant-500 focus:border-transparent placeholder-gray-400 dark:placeholder-gray-500 transition-colors">
            <svg x-show="saving[sat.date]" class="w-4 h-4 animate-spin text-radiant-500 flex-shrink-0" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </div>
        </div>
      </template>

      <div x-show="saturdays.length === 0" class="px-4 py-8 text-center text-sm text-gray-400 dark:text-gray-500">
        No Saturdays in this month.
      </div>
    </div>

  </main>

  <script src="js/facilitator-schedule-app.js"></script>
</body>
</html>
